services:
  postgres:
    image: postgres:16-alpine
    container_name: keyarena-postgres-1
    restart: unless-stopped
    environment:
      POSTGRES_USER: keyarena
      POSTGRES_PASSWORD: keyarena
      POSTGRES_DB: keyarena
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: keyarena-redis-1
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: